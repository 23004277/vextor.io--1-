    />

    <!-- Twitter / X Large Preview Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://vvextor.com" />
    <meta name="twitter:title" content="Vextor.io | Tactical Tank Evolution" />
    <meta
      name="twitter:description"
      content="A tactical browser tank evolution game with chaotic arena combat, upgrades, AI battles, bosses, and high-speed survival."

    <!-- Icons / App Feel -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 50% -20%, rgba(34, 211, 238, 0.08), transparent 34rem),
          radial-gradient(circle at 8% 8%, rgba(255, 0, 80, 0.045), transparent 22rem),
          linear-gradient(180deg, #02040a 0%, #010101 42%, #000 100%);
        color: #f8fafc;
        font-family: "Ubuntu", system-ui, sans-serif;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }

      #auth-return-veil[hidden] {
        display: none !important;
      }

      #auth-return-veil {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% -10%, rgba(34, 211, 238, 0.12), transparent 30rem),
          radial-gradient(circle at 85% 80%, rgba(45, 212, 191, 0.08), transparent 24rem),
          linear-gradient(180deg, rgba(2, 8, 20, 0.98), rgba(1, 5, 14, 0.995));
      }

      #auth-return-veil .auth-return-card {
        width: min(100%, 32rem);
        border-radius: 1.6rem;
        border: 1px solid rgba(103, 232, 249, 0.18);
        background: linear-gradient(180deg, rgba(7, 35, 58, 0.76), rgba(2, 7, 20, 0.98));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.56);
        padding: 28px 24px;
        text-align: center;
        backdrop-filter: blur(18px);
      }

      #auth-return-veil .auth-return-spinner {
        width: 34px;
        height: 34px;
        margin: 0 auto;
        border-radius: 9999px;
        border: 2px solid rgba(165, 243, 252, 0.18);
        border-top-color: rgba(165, 243, 252, 0.95);
        animation: auth-return-spin 0.9s linear infinite;
      }

      #auth-return-veil .auth-return-kicker {
        margin-top: 14px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(165, 243, 252, 0.72);
      }

      #auth-return-veil .auth-return-title {
        margin-top: 14px;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ecfeff;
      }

      #auth-return-veil .auth-return-copy {
        margin-top: 12px;
        font-size: 14px;
        line-height: 1.65;
        color: rgba(236, 254, 255, 0.72);
      }

      @keyframes auth-return-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body class="vextor-game-lock">
    <div id="auth-return-veil" hidden>
      <div class="auth-return-card">
        <div class="auth-return-spinner" aria-hidden="true"></div>
        <div class="auth-return-kicker">Google Auth Return</div>
        <div class="auth-return-title">Restoring Google Sign-In</div>
        <div class="auth-return-copy">Reconnecting your command profile and synced progression.</div>
      </div>
    </div>
    <noscript>
      <div
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 24px;
          background: #010101;
          color: #e2e8f0;
          font-family: Ubuntu, system-ui, sans-serif;
          text-align: center;
        "
      >
        <main
          style="
            max-width: 520px;
            border: 1px solid rgba(34, 211, 238, 0.22);
            border-radius: 18px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.65);
          "
        >
          <h1 style="margin: 0 0 12px; color: #67e8f9;">Vextor.io needs JavaScript</h1>
          <p style="margin: 0; line-height: 1.6;">
            Enable JavaScript in your browser to launch the tactical tank evolution arena.
          </p>
        </main>
      </div>
    </noscript>

    <div id="root"></div>

    <script>
      (function () {
        var KEY = 'vextor_google_redirect_pending';
        var MAX_AGE_MS = 5 * 60 * 1000;
        try {
          var raw = sessionStorage.getItem(KEY);
          if (!raw) return;
          var parsed = JSON.parse(raw);
          if (!parsed || !parsed.startedAt || Date.now() - parsed.startedAt > MAX_AGE_MS) {
            sessionStorage.removeItem(KEY);
            return;
          }
          var veil = document.getElementById('auth-return-veil');
          if (veil) {
            veil.removeAttribute('hidden');
          }
          document.documentElement.classList.add('auth-return-pending');
          document.body.classList.add('auth-return-pending');
        } catch (error) {
          console.warn('Auth return veil bootstrap failed', error);
        }
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>


<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vextor.io | Tactical Tank Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden; /* Prevent all page scrolling */
        background-color: #010101;
        font-family: 'Ubuntu', sans-serif;
        user-select: none;
        cursor: none !important;
      }
      
      /* Force hide cursor on all interactive elements */
      *, *::before, *::after {
        cursor: none !important;
      }
      
      canvas {
        display: block;
      }
      
      /* Hide scrollbars globally for a cleaner terminal look */
      ::-webkit-scrollbar {
        display: none;
      }
      
      /* Tactical Scanline Effect */
      .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(34, 211, 238, 0.08);
        box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        pointer-events: none;
        z-index: 100;
        animation: scanMove 10s linear infinite;
      }

      @keyframes scanMove {
        0% { transform: translateY(-10vh); opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { transform: translateY(110vh); opacity: 0; }
      }

      /* Remastered Chromatic Aberration */
      @keyframes chromatic {
        0%, 100% { text-shadow: 3px 0 1px rgba(255,0,80,0.5), -3px 0 1px rgba(0,255,255,0.5); }
        33% { text-shadow: -2px 2px 1px rgba(255,0,80,0.3), 2px -2px 1px rgba(0,255,255,0.3); }
        66% { text-shadow: 2px 2px 1px rgba(255,0,80,0.4), -2px -2px 1px rgba(0,255,255,0.4); }
      }

      .chromatic-text {
        animation: chromatic 4s ease-in-out infinite;
      }

      /* High Intensity Neon Pulse */
      @keyframes neonPulse {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 178, 225, 0.4)) drop-shadow(0 0 40px rgba(0, 178, 225, 0.15)); }
        50% { filter: drop-shadow(0 0 35px rgba(0, 178, 225, 0.6)) drop-shadow(0 0 70px rgba(0, 178, 225, 0.25)); }
      }

      .neon-glow {
        animation: neonPulse 3s ease-in-out infinite;
      }

      /* Shimmer Effect for Text */
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      .text-shimmer {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        background-size: 200% auto;
        -webkit-background-clip: text;
        animation: shimmer 3s infinite linear;
      }

      /* Button Liquid Motion */
      @keyframes flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .btn-flow {
        background-size: 200% 200%;
        animation: flow 6s ease infinite;
      }

      /* Engage Button Charge Effect */
      @keyframes charge {
        0% { transform: translateX(-100%) skewX(-45deg); }
        100% { transform: translateX(500%) skewX(-45deg); }
      }

      .btn-charge::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 25%;
        height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        animation: charge 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Panel Breathe Animation */
      @keyframes breathe {
        0%, 100% { border-color: rgba(255,255,255,0.03); }
        50% { border-color: rgba(34, 211, 238,0.15); }
      }

      .panel-breathe {
        animation: breathe 6s ease-in-out infinite;
      }

      /* Tactical Glitch for Title */
      @keyframes titleGlitch {
        0% { transform: translate(0); clip-path: inset(0 0 0 0); }
        2% { transform: translate(-2px, 1px); clip-path: inset(10% 0 85% 0); }
        4% { transform: translate(2px, -1px); clip-path: inset(80% 0 5% 0); }
        6% { transform: translate(0); clip-path: inset(0 0 0 0); }
        100% { transform: translate(0); }
      }
      .animate-title-glitch {
        animation: titleGlitch 5s infinite linear alternate-reverse;
      }

      @keyframes flicker {
        0% { opacity: 0.8; transform: translateX(0); }
        2% { opacity: 1; transform: translateX(1px); }
        4% { opacity: 0.9; transform: translateX(-1px); }
        6% { opacity: 1; transform: translateX(0); }
        100% { opacity: 1; transform: translateX(0); }
      }
      .animate-flicker {
        animation: flicker 3s infinite;
      }

      /* Corner Borders */
      .corner {
        position: absolute;
        width: 16px;
        height: 16px;
        border-color: rgba(34, 211, 238, 0.4);
        border-style: solid;
        border-width: 0;
        transition: all 0.3s ease;
      }
      .group:hover .corner {
        width: 24px;
        height: 24px;
        border-color: rgba(34, 211, 238, 0.8);
      }

      /* Text Shadow Depth */
      .text-shadow-deep {
        text-shadow: 0 10px 30px rgba(0,0,0,0.8);
      }

      /* Hex Grid Decoration */
      .hex-grid {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
        mask-image: radial-gradient(circle at center, black, transparent 80%);
        pointer-events: none;
      }

      /* Data Pulse Sweep */
      @keyframes sweep {
        0% { transform: translateX(-100%); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.8; }
        100% { transform: translateX(100%); opacity: 0; }
      }
      .animate-sweep {
        animation: sweep 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      /* Glass Panel Shine */
      .glass-shine::after {
          content: "";
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: linear-gradient(
            45deg,
            transparent,
            rgba(255, 255, 255, 0.05),
            transparent
          );
          transform: rotate(45deg);
          animation: glassShine 8s infinite linear;
          pointer-events: none;
      }
      @keyframes glassShine {
        0% { transform: translate(-30%, -30%) rotate(45deg); }
        100% { transform: translate(30%, 30%) rotate(45deg); }
      }
      @keyframes zoomIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1.1); }
      }
      .animate-in {
        animation-fill-mode: forwards;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .zoom-in {
        animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      /* Combined animation for death screen */
      .fade-in.zoom-in {
        animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>

  </head>
